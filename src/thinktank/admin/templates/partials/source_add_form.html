<div class="card" style="margin-bottom: 1rem; border-left: 4px solid #1a1a2e;">
    <h3>Add New Source</h3>
    <form hx-post="/admin/sources/add" hx-target="#source-list" hx-swap="innerHTML">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="add-name">Name *</label>
                <input type="text" id="add-name" name="name" required placeholder="e.g. The Tim Ferriss Show" />
            </div>
            <div class="form-group">
                <label for="add-url">URL *</label>
                <input type="text" id="add-url" name="url" required placeholder="e.g. https://example.com/feed.xml" />
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="add-thinker">Associated Thinker (optional)</label>
                <select id="add-thinker" name="thinker_id">
                    <option value="">None (independent source)</option>
                    {% for t in thinkers %}
                    <option value="{{ t.id }}">{{ t.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="add-source-type">Source Type</label>
                <select id="add-source-type" name="source_type">
                    <option value="podcast_rss" selected>Podcast RSS</option>
                    <option value="youtube_channel">YouTube Channel</option>
                </select>
            </div>
        </div>
        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
            <button type="submit" class="btn btn-primary">Add Source</button>
            <button type="button" class="btn" style="background: #eee;"
                onclick="document.getElementById('add-form-container').innerHTML = ''">Cancel</button>
        </div>
    </form>
</div>
