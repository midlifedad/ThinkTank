<div class="card" style="margin-bottom: 1rem; border-left: 4px solid #c90;">
    <h3>Edit Thinker: {{ thinker.name }}</h3>
    <form hx-post="/admin/thinkers/{{ thinker.id }}/edit" hx-target="#thinker-list" hx-swap="innerHTML">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="edit-name">Name *</label>
                <input type="text" id="edit-name" name="name" required value="{{ thinker.name }}" />
            </div>
            <div class="form-group">
                <label for="edit-tier">Tier *</label>
                <select id="edit-tier" name="tier" required>
                    <option value="1" {% if thinker.tier == 1 %}selected{% endif %}>Tier 1 (Primary)</option>
                    <option value="2" {% if thinker.tier == 2 %}selected{% endif %}>Tier 2 (Standard)</option>
                    <option value="3" {% if thinker.tier == 3 %}selected{% endif %}>Tier 3 (Peripheral)</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="edit-bio">Bio</label>
            <textarea id="edit-bio" name="bio" rows="2">{{ thinker.bio }}</textarea>
        </div>
        <div class="form-group">
            <label style="font-weight: normal; font-size: 0.85rem; display: flex; align-items: center; gap: 0.25rem;">
                <input type="checkbox" name="active" {% if thinker.active %}checked{% endif %} value="on" />
                Active
            </label>
        </div>
        {% if categories %}
        <div class="form-group">
            <label>Categories</label>
            <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                {% for cat in categories %}
                <label style="font-weight: normal; font-size: 0.85rem; display: flex; align-items: center; gap: 0.25rem;">
                    <input type="checkbox" name="category_ids" value="{{ cat.id }}"
                        {% if cat.id | string in current_category_ids %}checked{% endif %}
                    />
                    {{ cat.name }}
                </label>
                {% endfor %}
            </div>
        </div>
        {% endif %}
        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <button type="button" class="btn" style="background: #eee;"
                hx-get="/admin/thinkers/partials/list"
                hx-target="#thinker-list"
                hx-swap="innerHTML"
            >Cancel</button>
        </div>
    </form>
</div>
