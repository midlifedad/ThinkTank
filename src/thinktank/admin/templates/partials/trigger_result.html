{% if success %}
<div style="background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 0.5rem 0.75rem; border-radius: 4px; font-size: 0.9rem;">
    {{ message }}{% if job_id %} (Job ID: <span style="font-family: monospace;">{{ job_id }}</span>){% endif %}
</div>
{% else %}
<div style="background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 0.5rem 0.75rem; border-radius: 4px; font-size: 0.9rem;">
    {{ message }}
</div>
{% endif %}
