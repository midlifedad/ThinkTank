<div class="card" style="margin-bottom: 1rem; border-left: 4px solid #1a1a2e;">
    <h3>Bulk Import Thinkers</h3>
    <form hx-post="/admin/thinkers/bulk-import" hx-target="#thinker-list" hx-swap="innerHTML">
        <div class="form-group">
            <label for="bulk-names">Names (one per line) *</label>
            <textarea id="bulk-names" name="names" rows="8" required
                placeholder="Nassim Taleb&#10;Daniel Kahneman&#10;Yuval Noah Harari&#10;Steven Pinker"></textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="bulk-tier">Tier *</label>
                <select id="bulk-tier" name="tier" required>
                    <option value="1">Tier 1 (Primary)</option>
                    <option value="2" selected>Tier 2 (Standard)</option>
                    <option value="3">Tier 3 (Peripheral)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Categories</label>
                {% if categories %}
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                    {% for cat in categories %}
                    <label style="font-weight: normal; font-size: 0.85rem; display: flex; align-items: center; gap: 0.25rem;">
                        <input type="checkbox" name="category_ids" value="{{ cat.id }}" />
                        {{ cat.name }}
                    </label>
                    {% endfor %}
                </div>
                {% else %}
                <p style="color: #999; font-size: 0.85rem;">No categories defined.</p>
                {% endif %}
            </div>
        </div>
        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
            <button type="submit" class="btn btn-primary">Import All</button>
            <button type="button" class="btn" style="background: #eee;"
                onclick="document.getElementById('add-form-container').innerHTML = ''">Cancel</button>
        </div>
    </form>
</div>
