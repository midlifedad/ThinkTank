{% if costs %}
<table>
    <thead>
        <tr>
            <th>API</th>
            <th>Calls (24h)</th>
            <th>Est. Cost (USD)</th>
        </tr>
    </thead>
    <tbody>
        {% for c in costs %}
        <tr>
            <td>{{ c.api_name }}</td>
            <td>{{ c.call_count }}</td>
            <td>${{ "%.4f" | format(c.cost_usd) }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="empty">No API usage in the last 24 hours.</p>
{% endif %}
