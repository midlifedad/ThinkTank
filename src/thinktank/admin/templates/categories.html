{% extends "base.html" %}
{% block content %}
<h1 style="margin-bottom: 1rem;">Category Taxonomy</h1>

<div class="card" style="margin-bottom: 1rem;">
    <h3>Category Tree</h3>
    <div id="category-tree"
         hx-get="/admin/categories/partials/tree"
         hx-trigger="load, every 10s"
         hx-swap="innerHTML">
        Loading...
    </div>
</div>

<div class="card">
    <h3>Create Category</h3>
    <form hx-post="/admin/categories/create"
          hx-target="#category-tree"
          hx-swap="innerHTML">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="slug">Slug</label>
            <input type="text" id="slug" name="slug" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label for="parent_id">Parent ID (optional)</label>
            <input type="text" id="parent_id" name="parent_id" placeholder="UUID of parent category">
        </div>
        <button type="submit" class="btn btn-primary">Create Category</button>
    </form>
</div>
{% endblock %}
