<!DOCTYPE html>
<html>
<head>
    <title>ThinkTank Admin</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        // CSRF double-submit cookie (ADMIN-REVIEW HI-05). Reads csrf_token
        // cookie and echoes it on every HTMX request as X-CSRF-Token so the
        // admin CSRFMiddleware can validate mutating requests.
        document.addEventListener('htmx:configRequest', function (event) {
            var match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
            if (match) {
                event.detail.headers['X-CSRF-Token'] = decodeURIComponent(match[1]);
            }
        });
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a1a2e; padding: 1rem 2rem; display: flex; gap: 2rem; align-items: center; }
        nav a { color: #e0e0e0; text-decoration: none; font-weight: 500; }
        nav a:hover { color: #fff; }
        nav .brand { font-size: 1.2rem; font-weight: 700; color: #fff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; padding-bottom: 50px; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .card { background: #fff; border: 1px solid #ddd; padding: 1rem; border-radius: 4px; }
        .card h3 { margin-bottom: 0.75rem; font-size: 0.95rem; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid #eee; }
        th { font-weight: 600; color: #666; }
        .error { color: #c00; }
        .warning { color: #c90; }
        .healthy { color: #0a0; }
        .stat-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid #eee; }
        .stat-label { color: #666; }
        .stat-value { font-weight: 600; }
        .gauge { height: 20px; background: #eee; border-radius: 10px; overflow: hidden; margin: 0.3rem 0; }
        .gauge-fill { height: 100%; transition: width 0.3s; border-radius: 10px; }
        .gauge-green { background: #0a0; }
        .gauge-yellow { background: #cc0; }
        .gauge-red { background: #c00; }
        .timeout-highlight { background: #fff3cd; border-left: 4px solid #ffc107; }
        .status-up { color: #0a0; font-weight: bold; }
        .status-down { color: #c00; font-weight: bold; }
        .status-unknown { color: #999; font-weight: bold; }
        .btn { padding: 0.4rem 0.8rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .btn-primary { background: #1a1a2e; color: #fff; }
        .btn-danger { background: #c00; color: #fff; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.8rem; }
        .form-group { margin-bottom: 0.75rem; }
        .form-group label { display: block; margin-bottom: 0.25rem; font-weight: 500; font-size: 0.85rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; }
        .card-full { grid-column: 1 / -1; }
        .empty { color: #999; font-style: italic; padding: 1rem 0; }

        /* Chat drawer styles */
        .chat-drawer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: #fff; border-top: 2px solid #1a1a2e; max-height: 500px; }
        .chat-collapsed .chat-body { display: none; }
        .chat-header { background: #1a1a2e; color: #fff; padding: 0.5rem 1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .chat-title { font-weight: 600; font-size: 0.9rem; }
        .chat-toggle-icon { font-size: 0.8rem; transition: transform 0.3s; }
        .chat-collapsed .chat-toggle-icon { transform: rotate(180deg); }
        .chat-body { height: 350px; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 0.75rem; font-size: 0.85rem; }
        .chat-msg { margin-bottom: 0.5rem; padding: 0.4rem 0.6rem; border-radius: 6px; max-width: 85%; word-wrap: break-word; white-space: pre-wrap; }
        .chat-msg-user { background: #e8eaf6; margin-left: auto; text-align: right; }
        .chat-msg-assistant { background: #f5f5f5; }
        .chat-msg-streaming { border-left: 3px solid #1a1a2e; }
        .chat-msg-error { background: #ffebee; color: #c00; }
        .chat-proposal { background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; padding: 0.6rem; margin: 0.5rem 0; }
        .chat-proposal-actions { display: flex; gap: 0.5rem; margin-top: 0.4rem; }
        .chat-proposal .btn-confirm { background: #0a0; color: #fff; padding: 0.25rem 0.6rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .chat-proposal .btn-dismiss { background: #999; color: #fff; padding: 0.25rem 0.6rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .chat-input-area { display: flex; gap: 0.5rem; padding: 0.5rem 0.75rem; border-top: 1px solid #eee; }
        .chat-input-area input { flex: 1; padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">ThinkTank Admin</span>
        <a href="/admin/">Dashboard</a>
        <a href="/admin/thinkers">Thinkers</a>
        <a href="/admin/sources">Sources</a>
        <a href="/admin/pipeline">Pipeline</a>
        <a href="/admin/llm">LLM Panel</a>
        <a href="/admin/categories">Categories</a>
        <a href="/admin/api-keys">API Keys</a>
        <a href="/admin/config">Config</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% include "partials/chat_drawer.html" %}

    <script>
    (function() {
        var STORAGE_KEY = 'thinktank_chat_state';
        var MAX_MESSAGES = 100;

        function getChatState() {
            try {
                var raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    return JSON.parse(raw);
                }
            } catch (e) {}
            return { sessionId: null, messages: [], isOpen: false };
        }

        function saveChatState(state) {
            if (state.messages.length > MAX_MESSAGES) {
                state.messages = state.messages.slice(state.messages.length - MAX_MESSAGES);
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            var container = document.getElementById('chat-messages');
            if (container) {
                container.scrollTop = container.scrollHeight;
            }
        }

        function appendUserMessage(text, save) {
            var container = document.getElementById('chat-messages');
            var div = document.createElement('div');
            div.className = 'chat-msg chat-msg-user';
            div.textContent = text;
            container.appendChild(div);
            if (save) {
                var state = getChatState();
                state.messages.push({ role: 'user', content: text });
                saveChatState(state);
            }
            scrollToBottom();
        }

        function appendAssistantMessage(text, save) {
            var container = document.getElementById('chat-messages');
            var div = document.createElement('div');
            div.className = 'chat-msg chat-msg-assistant';
            div.textContent = text;
            container.appendChild(div);
            if (save) {
                var state = getChatState();
                state.messages.push({ role: 'assistant', content: text });
                saveChatState(state);
            }
            scrollToBottom();
        }

        function appendErrorMessage(text, save) {
            var container = document.getElementById('chat-messages');
            var div = document.createElement('div');
            div.className = 'chat-msg chat-msg-error';
            div.textContent = 'Error: ' + text;
            container.appendChild(div);
            if (save) {
                var state = getChatState();
                state.messages.push({ role: 'error', content: text });
                saveChatState(state);
            }
            scrollToBottom();
        }

        function appendProposal(proposal, save) {
            var container = document.getElementById('chat-messages');
            var div = document.createElement('div');
            div.className = 'chat-proposal';
            div.id = 'proposal-' + proposal.proposal_id;
            div.innerHTML =
                '<strong>' + escapeHtml(proposal.action_type) + '</strong>' +
                '<div>' + escapeHtml(proposal.target || '') + '</div>' +
                '<small>' + escapeHtml(proposal.explanation || '') + '</small>' +
                '<div class="chat-proposal-actions">' +
                    '<button class="btn-confirm" onclick="confirmProposal(\'' + escapeHtml(proposal.proposal_id) + '\')">Confirm</button>' +
                    '<button class="btn-dismiss" onclick="dismissProposal(\'' + escapeHtml(proposal.proposal_id) + '\')">Dismiss</button>' +
                '</div>';
            container.appendChild(div);
            if (save) {
                var state = getChatState();
                state.messages.push({ role: 'proposal', content: proposal });
                saveChatState(state);
            }
            scrollToBottom();
        }

        function renderMessages() {
            var container = document.getElementById('chat-messages');
            container.innerHTML = '';
            var state = getChatState();
            for (var i = 0; i < state.messages.length; i++) {
                var msg = state.messages[i];
                if (msg.role === 'user') {
                    appendUserMessage(msg.content, false);
                } else if (msg.role === 'assistant') {
                    appendAssistantMessage(msg.content, false);
                } else if (msg.role === 'error') {
                    appendErrorMessage(msg.content, false);
                } else if (msg.role === 'proposal') {
                    appendProposal(msg.content, false);
                }
            }
        }

        window.toggleChat = function() {
            var drawer = document.getElementById('chat-drawer');
            drawer.classList.toggle('chat-collapsed');
            var state = getChatState();
            state.isOpen = !drawer.classList.contains('chat-collapsed');
            saveChatState(state);
            if (state.isOpen) {
                var input = document.getElementById('chat-input');
                if (input) input.focus();
                scrollToBottom();
            }
        };

        window.sendMessage = function(event) {
            event.preventDefault();
            var input = document.getElementById('chat-input');
            var sendBtn = document.getElementById('chat-send-btn');
            var message = input.value.trim();
            if (!message) return;

            input.value = '';
            sendBtn.disabled = true;

            appendUserMessage(message, true);

            var container = document.getElementById('chat-messages');
            var streamDiv = document.createElement('div');
            streamDiv.id = 'streaming-msg';
            streamDiv.className = 'chat-msg chat-msg-assistant chat-msg-streaming';
            streamDiv.textContent = '';
            container.appendChild(streamDiv);
            scrollToBottom();

            var state = getChatState();
            var formData = new FormData();
            formData.append('message', message);
            if (state.sessionId) {
                formData.append('session_id', state.sessionId);
            }

            fetch('/admin/chat/send', {
                method: 'POST',
                body: formData
            }).then(function(response) {
                if (!response.ok) {
                    throw new Error('Server returned ' + response.status);
                }
                var reader = response.body.getReader();
                var decoder = new TextDecoder();
                var buffer = '';

                function processChunk() {
                    return reader.read().then(function(result) {
                        if (result.done) {
                            // Process any remaining buffer
                            if (buffer.trim()) {
                                processLines(buffer);
                            }
                            // Stream complete: finalize
                            var streaming = document.getElementById('streaming-msg');
                            if (streaming) {
                                streaming.classList.remove('chat-msg-streaming');
                                streaming.removeAttribute('id');
                                var finalText = streaming.textContent;
                                if (finalText) {
                                    var st = getChatState();
                                    st.messages.push({ role: 'assistant', content: finalText });
                                    saveChatState(st);
                                }
                            }
                            sendBtn.disabled = false;
                            return;
                        }

                        buffer += decoder.decode(result.value, { stream: true });
                        var lines = buffer.split('\n');
                        // Keep the last partial line in buffer
                        buffer = lines.pop() || '';

                        processLines(lines.join('\n'));

                        return processChunk();
                    });
                }

                function processLines(text) {
                    var lines = text.split('\n');
                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();
                        if (line.indexOf('data: ') === 0) {
                            var jsonStr = line.substring(6);
                            try {
                                var evt = JSON.parse(jsonStr);
                                handleSSEEvent(evt);
                            } catch (e) {
                                // Skip unparseable lines
                            }
                        }
                    }
                }

                return processChunk();
            }).catch(function(err) {
                var streaming = document.getElementById('streaming-msg');
                if (streaming) {
                    streaming.remove();
                }
                appendErrorMessage(err.message, true);
                sendBtn.disabled = false;
            });
        };

        function handleSSEEvent(evt) {
            if (evt.type === 'session_init') {
                var state = getChatState();
                state.sessionId = evt.session_id;
                saveChatState(state);
            } else if (evt.type === 'text_delta') {
                var streaming = document.getElementById('streaming-msg');
                if (streaming) {
                    streaming.textContent += evt.text;
                    scrollToBottom();
                }
            } else if (evt.type === 'proposal') {
                appendProposal(evt, true);
            } else if (evt.type === 'tool_result') {
                // Tool results are informational; agent will summarize in text
            } else if (evt.type === 'error') {
                appendErrorMessage(evt.message, true);
            } else if (evt.type === 'done') {
                // No-op, stream completion handled in processChunk
            }
        }

        window.confirmProposal = function(proposalId) {
            var state = getChatState();
            var formData = new FormData();
            if (state.sessionId) {
                formData.append('session_id', state.sessionId);
            }

            var proposalDiv = document.getElementById('proposal-' + proposalId);

            fetch('/admin/chat/confirm/' + proposalId, {
                method: 'POST',
                body: formData
            }).then(function(response) {
                return response.json();
            }).then(function(data) {
                if (proposalDiv) {
                    if (data.success) {
                        proposalDiv.innerHTML = '<div style="color: #0a0; font-weight: 600;">Action confirmed: ' + escapeHtml(data.message || 'Success') + '</div>';
                    } else {
                        proposalDiv.innerHTML = '<div style="color: #c00; font-weight: 600;">Error: ' + escapeHtml(data.error || 'Unknown error') + '</div>';
                    }
                }
            }).catch(function(err) {
                if (proposalDiv) {
                    proposalDiv.innerHTML = '<div style="color: #c00; font-weight: 600;">Error: ' + escapeHtml(err.message) + '</div>';
                }
            });
        };

        window.dismissProposal = function(proposalId) {
            var proposalDiv = document.getElementById('proposal-' + proposalId);
            if (proposalDiv) {
                proposalDiv.innerHTML = '<div style="color: #999;">Action dismissed</div>';
            }
        };

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            var state = getChatState();
            var drawer = document.getElementById('chat-drawer');
            if (state.isOpen) {
                drawer.classList.remove('chat-collapsed');
            }
            renderMessages();
        });
    })();
    </script>
</body>
</html>
