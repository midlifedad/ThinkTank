services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thinktank
      POSTGRES_PASSWORD: thinktank
      POSTGRES_DB: thinktank
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thinktank"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://thinktank:thinktank@postgres:5432/thinktank
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://thinktank:thinktank@postgres:5432/thinktank
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker-cpu:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker-cpu
    environment:
      DATABASE_URL: postgresql+asyncpg://thinktank:thinktank@postgres:5432/thinktank
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
