services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thinktank_test
      POSTGRES_PASSWORD: thinktank_test
      POSTGRES_DB: thinktank_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thinktank_test"]
      interval: 2s
      timeout: 2s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
