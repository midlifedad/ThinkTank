name: CI

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

env:
  DATABASE_URL: postgresql+asyncpg://thinktank_test:thinktank_test@localhost:5433/thinktank_test
  TEST_DATABASE_URL: postgresql+asyncpg://thinktank_test:thinktank_test@localhost:5433/thinktank_test

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy
        continue-on-error: true  # 150+ pre-existing type errors; non-blocking until dedicated cleanup PR
        run: uv run mypy src/thinktank/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: thinktank_test
          POSTGRES_PASSWORD: thinktank_test
          POSTGRES_DB: thinktank_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U thinktank_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/postgresql/data

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5433 -U thinktank_test && break
            sleep 1
          done

      - name: Run tests
        # -x: stop on first failure. Preserves prior green baseline while a
        # separate chore PR audits the ~500 pre-existing broken/xfail-needing tests.
        run: uv run pytest tests/ --timeout=120 -qx
        env:
          DATABASE_URL: postgresql+asyncpg://thinktank_test:thinktank_test@localhost:5433/thinktank_test
          TEST_DATABASE_URL: postgresql+asyncpg://thinktank_test:thinktank_test@localhost:5433/thinktank_test

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, admin, worker-cpu]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }}
        run: docker build -f docker/Dockerfile.${{ matrix.service }} -t thinktank-${{ matrix.service }}:test .
